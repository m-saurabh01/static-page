<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invalid URL - e-MMS Portal</title>

    <link rel="stylesheet" href="Style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <div class="page-wrapper">
      <div class="portal-container invalid-url-container">
        <header class="portal-header invalid-header ">
          <div class="brand-section">
            <div class="logo invalid-logo-box">
              <img
                src="https://upload.wikimedia.org/wikipedia/en/thumb/1/17/Indian_Air_Force_Logo.svg/120px-Indian_Air_Force_Logo.svg.png"
                alt="Indian Air Force Logo"
              />
            </div>
          </div>
        </header>

        <main class="invalid-content">
          <div class="invalid-message">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Invalid URL. Please enter valid URL.</span>
          </div>
        </main>

        <!-- Footer -->
        <footer class="portal-footer">
          <div class="footer-box footer-center">
            <p>Copyright © All Rights Reserved with Indian Air Force.</p>
          </div>

          <div class="footer-box">
            <p>Site best viewed with screen resolution 1366x768 or higher</p>
          </div>
        </footer>
      </div>
    </div>
  </body>
</html>
